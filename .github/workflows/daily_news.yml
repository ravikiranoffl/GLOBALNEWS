
name: Daily Global News Generator

on:
  schedule:
    - cron: '00 18 * * *' # 11:30 PM IST (18:00 UTC)
  workflow_dispatch:      # Manual trigger for testing

jobs:
  generate-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install google-genai

      - name: Run News Generator Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate_news.py

      - name: Commit and Push Updates
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "GN$(date +'%Y%m%d')A1" || echo "No changes to commit"
          git push

      # --- STEP TO FIX THE DATE IN SUBJECT ---
      - name: Get Current Date
        id: date
        run: echo "NOW=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      # --- SEND THE FORMATTED HTML EMAIL ---
      - name: Send Breaking News Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          
          # This correctly uses the date we just calculated
          subject: "నేటి ముఖ్యాంశాలు:  ${{ env.NOW }}"
          
          to: ${{ secrets.GMAIL_USER }}
          from: "జెమిని తెలుగు వార్తా వాహిని"
          html_body: file://email_body.html
